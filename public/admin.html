<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>COMPASS – Game Results</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}

  :root{
    --bg:#060a1e;
    --surface:#0d1235;
    --gold:#f0b429;
    --text:#ffffff;
    --muted:#8898c8;
    --border:rgba(255,255,255,.08);
    --row-hover:rgba(40,59,134,.3);
  }

  body{
    background:var(--bg);color:var(--text);
    font-family:'Segoe UI',system-ui,sans-serif;
    min-height:100vh;padding:32px 24px;
  }

  header{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:32px;flex-wrap:wrap;gap:16px;
  }
  .header-left{display:flex;align-items:center;gap:16px}
  header h1{font-size:1.4rem;font-weight:800;letter-spacing:-.01em}
  header p{color:var(--muted);font-size:.85rem;margin-top:2px}

  .refresh-btn{
    background:#283b86;color:#fff;border:1.5px solid rgba(255,255,255,.2);
    border-radius:10px;padding:10px 20px;font-size:.9rem;font-weight:700;
    cursor:pointer;transition:background .2s;
  }
  .refresh-btn:hover{background:#3349a8}

  .stats{
    display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap;
  }
  .stat-card{
    background:var(--surface);border:1px solid var(--border);
    border-radius:12px;padding:16px 24px;min-width:120px;
  }
  .stat-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.12em}
  .stat-value{font-size:1.8rem;font-weight:800;margin-top:4px}
  .stat-value.gold{color:var(--gold)}

  .table-wrap{
    background:var(--surface);border:1px solid var(--border);
    border-radius:14px;overflow:hidden;
  }

  table{width:100%;border-collapse:collapse}
  thead{background:rgba(40,59,134,.4)}
  th{
    padding:14px 18px;text-align:left;
    font-size:.7rem;font-weight:700;color:var(--muted);
    text-transform:uppercase;letter-spacing:.14em;
    border-bottom:1px solid var(--border);
  }
  td{
    padding:13px 18px;font-size:.95rem;
    border-bottom:1px solid var(--border);
    vertical-align:middle;
  }
  tr:last-child td{border-bottom:none}
  tr:hover td{background:var(--row-hover)}

  .rank-cell{font-weight:800;font-size:1.1rem;text-align:center;width:56px}
  .medal{font-size:1.3rem}
  .time-cell{font-variant-numeric:tabular-nums;font-weight:700;color:var(--gold)}
  .phone-cell{color:var(--muted);font-size:.9rem}
  .date-cell{color:var(--muted);font-size:.82rem}

  .empty{
    padding:56px;text-align:center;color:var(--muted);font-size:.95rem;
  }
  .empty-icon{font-size:2.5rem;margin-bottom:12px}

  #status{
    margin-bottom:16px;font-size:.85rem;color:var(--muted);
  }
  #status.error{color:#e53e3e}
  #dbStatus{
    display:inline-flex;align-items:center;gap:6px;
    font-size:.78rem;padding:4px 12px;border-radius:20px;margin-bottom:16px;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--muted);
  }
  #dbStatus .dot{width:7px;height:7px;border-radius:50%;background:#e53e3e}
  #dbStatus.connected .dot{background:#38a169}
  #dbStatus.connected{color:#68d391}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <svg viewBox="0 177 1000 432" xmlns="http://www.w3.org/2000/svg" style="height:36px;width:auto">
      <g fill="white">
        <path d="M10.23,177.57h67.79c5.64,0,10.23,4.58,10.23,10.23v410.11c0,5.64-4.58,10.23-10.23,10.23H10.23c-5.64,0-10.23-4.58-10.23-10.23V187.8c0-5.65,4.58-10.23,10.23-10.23Z"/>
        <path d="M172.28,451.36c11.5-41.08,41.1-86.95,75.95-112.05,5.06-3.64,8.19-9.39,8.19-15.63v-135.88c0-5.65-4.58-10.23-10.23-10.23h-67.78c-5.65,0-10.23,4.58-10.23,10.23v263c0,2.45,3.44,2.92,4.1.56Z"/>
        <path d="M539.47,177.57h-67.79c-5.65,0-10.23,4.58-10.23,10.23v151.55c0,5.75-4.66,10.42-10.42,10.42h-84.85c-109.25,0-198,88.56-198,197.81v50.34c0,5.65,4.58,10.22,10.22,10.22h67.8c5.65,0,10.22-4.58,10.22-10.22v-50.33c0-60.62,49.14-109.76,109.76-109.76h84.99c5.69.08,10.28,4.7,10.28,10.4v149.69c0,5.65,4.58,10.23,10.23,10.23h67.79c5.65,0,10.23-4.58,10.23-10.23V187.79c0-5.65-4.58-10.23-10.23-10.23Z"/>
        <path d="M989.77,177.57h-67.8c-5.65,0-10.22,4.58-10.22,10.22v50.33c0,60.62-49.14,109.76-109.76,109.76h-84.99c-5.69-.08-10.28-4.7-10.28-10.4v-149.69c0-5.65-4.58-10.23-10.23-10.23h-67.79c-5.65,0-10.23,4.58-10.23,10.23v410.11c0,5.65,4.58,10.23,10.23,10.23h67.79c5.65,0,10.23-4.58,10.23-10.23v-151.55c0-5.75,4.66-10.42,10.42-10.42h84.85c109.25,0,198-88.56,198-197.81v-50.34c0-5.65-4.58-10.22-10.22-10.22Z"/>
        <path d="M995.89,334.34c-11.5,41.08-41.1,86.95-75.95,112.05-5.06,3.65-8.19,9.39-8.19,15.63v135.88c0,5.65,4.58,10.23,10.23,10.23h67.78c5.65,0,10.23-4.58,10.23-10.23v-263c0-2.45-3.44-2.92-4.1-.56Z"/>
      </g>
    </svg>
    <div style="padding-left:30px">
      <h1>Game Results</h1>
      <p>All submissions — including contact details</p>
    </div>
  </div>
  <button class="refresh-btn" onclick="load()">Refresh</button>
</header>

<div id="dbStatus"><span class="dot"></span><span id="dbLabel">Checking database…</span></div>
<div id="status"></div>

<div class="stats">
  <div class="stat-card">
    <div class="stat-label">Total Plays</div>
    <div class="stat-value" id="totalPlays">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Best Time</div>
    <div class="stat-value gold" id="bestTime">—</div>
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th style="text-align:center">Rank</th>
        <th>Name</th>
        <th>Phone</th>
        <th>Time</th>
        <th>Played At</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="5" class="empty"><div class="empty-icon">⏳</div>Loading…</td></tr>
    </tbody>
  </table>
</div>

<script>
const MEDALS = ['🥇','🥈','🥉'];

function escHtml(s) {
  if (!s) return '<span style="color:rgba(255,255,255,.25)">—</span>';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-SG', { day:'2-digit', month:'short', year:'numeric' })
    + ' ' + d.toLocaleTimeString('en-SG', { hour:'2-digit', minute:'2-digit' });
}

async function checkDB() {
  try {
    const res = await fetch('/api/status');
    const { db } = await res.json();
    const el = document.getElementById('dbStatus');
    el.className = db ? 'connected' : '';
    document.getElementById('dbLabel').textContent = db ? 'Database connected' : 'No database — using in-memory (phone numbers not stored)';
  } catch {}
}

async function load() {
  const statusEl = document.getElementById('status');
  statusEl.className = '';
  statusEl.textContent = 'Loading…';

  try {
    const res = await fetch('/api/scores');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const rows = await res.json();

    statusEl.textContent = `Last refreshed: ${new Date().toLocaleTimeString('en-SG')}`;

    document.getElementById('totalPlays').textContent = rows.length;
    document.getElementById('bestTime').textContent = rows.length ? rows[0].timeStr : '—';

    const tbody = document.getElementById('tbody');

    if (rows.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5" class="empty"><div class="empty-icon">🏅</div>No submissions yet.</td></tr>`;
      return;
    }

    tbody.innerHTML = rows.map((r, i) => `
      <tr>
        <td class="rank-cell">${i < 3 ? `<span class="medal">${MEDALS[i]}</span>` : i + 1}</td>
        <td><strong>${escHtml(r.name)}</strong></td>
        <td class="phone-cell">${escHtml(r.phone)}</td>
        <td class="time-cell">${escHtml(r.timeStr)}</td>
        <td class="date-cell">${fmtDate(r.playedAt)}</td>
      </tr>`).join('');

  } catch (err) {
    const statusEl = document.getElementById('status');
    statusEl.className = 'error';
    statusEl.textContent = `Error loading data: ${err.message}`;
  }
}

checkDB();
load();
</script>
</body>
</html>
