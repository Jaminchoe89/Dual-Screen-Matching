<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>COMPASS – Game Results</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}

  :root{
    --bg:#060a1e;
    --surface:#0d1235;
    --gold:#f0b429;
    --text:#ffffff;
    --muted:#8898c8;
    --border:rgba(255,255,255,.08);
    --row-hover:rgba(40,59,134,.3);
  }

  body{
    background:var(--bg);color:var(--text);
    font-family:'Segoe UI',system-ui,sans-serif;
    min-height:100vh;padding:32px 24px;
  }

  header{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:32px;flex-wrap:wrap;gap:16px;
  }
  .header-left{display:flex;align-items:center;gap:16px}
  header h1{font-size:1.4rem;font-weight:800;letter-spacing:-.01em}
  header p{color:var(--muted);font-size:.85rem;margin-top:2px}

  .refresh-btn{
    background:#283b86;color:#fff;border:1.5px solid rgba(255,255,255,.2);
    border-radius:10px;padding:10px 20px;font-size:.9rem;font-weight:700;
    cursor:pointer;transition:background .2s;
  }
  .refresh-btn:hover{background:#3349a8}

  .stats{
    display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap;
  }
  .stat-card{
    background:var(--surface);border:1px solid var(--border);
    border-radius:12px;padding:16px 24px;min-width:120px;
  }
  .stat-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.12em}
  .stat-value{font-size:1.8rem;font-weight:800;margin-top:4px}
  .stat-value.gold{color:var(--gold)}

  .table-wrap{
    background:var(--surface);border:1px solid var(--border);
    border-radius:14px;overflow:hidden;
  }

  table{width:100%;border-collapse:collapse}
  thead{background:rgba(40,59,134,.4)}
  th{
    padding:14px 18px;text-align:left;
    font-size:.7rem;font-weight:700;color:var(--muted);
    text-transform:uppercase;letter-spacing:.14em;
    border-bottom:1px solid var(--border);
  }
  td{
    padding:13px 18px;font-size:.95rem;
    border-bottom:1px solid var(--border);
    vertical-align:middle;
  }
  tr:last-child td{border-bottom:none}
  tr:hover td{background:var(--row-hover)}

  .rank-cell{font-weight:800;font-size:1.1rem;text-align:center;width:56px}
  .medal{font-size:1.3rem}
  .time-cell{font-variant-numeric:tabular-nums;font-weight:700;color:var(--gold)}
  .phone-cell{color:var(--muted);font-size:.9rem}
  .date-cell{color:var(--muted);font-size:.82rem}

  .empty{
    padding:56px;text-align:center;color:var(--muted);font-size:.95rem;
  }
  .empty-icon{font-size:2.5rem;margin-bottom:12px}

  #status{
    margin-bottom:16px;font-size:.85rem;color:var(--muted);
  }
  #status.error{color:#e53e3e}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <svg viewBox="65 12 270 115" xmlns="http://www.w3.org/2000/svg" style="width:100px;height:42px">
      <g fill="white">
        <path d="M75.82,17.78h16.82c1.4,0,2.54,1.14,2.54,2.54v101.75c0,1.4-1.14,2.54-2.54,2.54h-16.82c-1.4,0-2.54-1.14-2.54-2.54V20.32c0-1.4,1.14-2.54,2.54-2.54Z"/>
        <path d="M116.03,85.72c2.85-10.19,10.2-21.57,18.84-27.8,1.26-.9,2.03-2.33,2.03-3.88V20.32c0-1.4-1.14-2.54-2.54-2.54h-16.82c-1.4,0-2.54,1.14-2.54,2.54v65.25c0,.61.85.72,1.02.14Z"/>
        <path d="M207.13,17.78h-16.82c-1.4,0-2.54,1.14-2.54,2.54v37.6c0,1.43-1.16,2.58-2.58,2.58h-21.05c-27.11,0-49.13,21.97-49.13,49.08v12.49c0,1.4,1.14,2.54,2.54,2.54h16.82c1.4,0,2.54-1.14,2.54-2.54v-12.49c0-15.04,12.19-27.23,27.23-27.23h21.09c1.41.02,2.55,1.17,2.55,2.58v37.14c0,1.4,1.14,2.54,2.54,2.54h16.82c1.4,0,2.54-1.14,2.54-2.54V20.32c0-1.4-1.14-2.54-2.54-2.54Z"/>
        <path d="M318.86,17.78h-16.82c-1.4,0-2.54,1.14,2.54,2.54v12.49c0,15.04-12.19,27.23-27.23,27.23h-21.09c-1.41-.02-2.55-1.17-2.55-2.58V20.32c0-1.4-1.14-2.54-2.54-2.54h-16.82c-1.4,0-2.54,1.14-2.54,2.54v101.75c0,1.4,1.14,2.54,2.54,2.54h16.82c1.4,0,2.54-1.14,2.54-2.54v-37.6c0-1.43,1.16-2.58,2.58-2.58h21.05c27.11,0,49.13-21.97,49.13-49.08v-12.49c0-1.4-1.14-2.54-2.54-2.54Z"/>
        <path d="M320.38,56.68c-2.85,10.19-10.2,21.57-18.84,27.8-1.26.9-2.03,2.33-2.03,3.88v33.71c0,1.4,1.14,2.54,2.54,2.54h16.82c1.4,0,2.54-1.14,2.54-2.54V56.82c0-.61-.85-.72-1.02-.14Z"/>
      </g>
    </svg>
    <div>
      <h1>Game Results</h1>
      <p>All submissions — including contact details</p>
    </div>
  </div>
  <button class="refresh-btn" onclick="load()">Refresh</button>
</header>

<div id="status"></div>

<div class="stats">
  <div class="stat-card">
    <div class="stat-label">Total Plays</div>
    <div class="stat-value" id="totalPlays">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Best Time</div>
    <div class="stat-value gold" id="bestTime">—</div>
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th style="text-align:center">Rank</th>
        <th>Name</th>
        <th>Phone</th>
        <th>Time</th>
        <th>Played At</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="5" class="empty"><div class="empty-icon">⏳</div>Loading…</td></tr>
    </tbody>
  </table>
</div>

<script>
const MEDALS = ['🥇','🥈','🥉'];

function escHtml(s) {
  if (!s) return '<span style="color:rgba(255,255,255,.25)">—</span>';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-SG', { day:'2-digit', month:'short', year:'numeric' })
    + ' ' + d.toLocaleTimeString('en-SG', { hour:'2-digit', minute:'2-digit' });
}

async function load() {
  const statusEl = document.getElementById('status');
  statusEl.className = '';
  statusEl.textContent = 'Loading…';

  try {
    const res = await fetch('/api/scores');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const rows = await res.json();

    statusEl.textContent = `Last refreshed: ${new Date().toLocaleTimeString('en-SG')}`;

    document.getElementById('totalPlays').textContent = rows.length;
    document.getElementById('bestTime').textContent = rows.length ? rows[0].timeStr : '—';

    const tbody = document.getElementById('tbody');

    if (rows.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5" class="empty"><div class="empty-icon">🏅</div>No submissions yet.</td></tr>`;
      return;
    }

    tbody.innerHTML = rows.map((r, i) => `
      <tr>
        <td class="rank-cell">${i < 3 ? `<span class="medal">${MEDALS[i]}</span>` : i + 1}</td>
        <td><strong>${escHtml(r.name)}</strong></td>
        <td class="phone-cell">${escHtml(r.phone)}</td>
        <td class="time-cell">${escHtml(r.timeStr)}</td>
        <td class="date-cell">${fmtDate(r.playedAt)}</td>
      </tr>`).join('');

  } catch (err) {
    const statusEl = document.getElementById('status');
    statusEl.className = 'error';
    statusEl.textContent = `Error loading data: ${err.message}`;
  }
}

load();
</script>
</body>
</html>
