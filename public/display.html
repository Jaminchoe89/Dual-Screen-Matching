<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>COMPASS – Card Match Display</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;user-select:none}

  :root{
    --bg:#060a1e;
    --surface:#0d1235;
    --teal:#ffffff;
    --teal-glow:rgba(255,255,255,.18);
    --gold:#f0b429;
    --gold-glow:rgba(240,180,41,.25);
    --text:#ffffff;
    --muted:#8898c8;
    --card-back:#283b86;
    --card-front:#f8f9ff;
    --radius:10px;
  }

  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Segoe UI',system-ui,sans-serif;color:var(--text)}

  /* ─── LAYOUT ─────────────────────────────────────────────────── */
  #app{display:flex;flex-direction:column;height:100%;gap:0}

  #gamePane{
    flex:0 0 65%;display:flex;flex-direction:column;
    padding:18px 28px 14px;
    background:radial-gradient(ellipse at 50% 20%,#162050 0%,var(--bg) 65%);
    border-bottom:1px solid rgba(255,255,255,.06);
  }

  #sidePane{
    flex:1;display:flex;flex-direction:column;
    padding:14px 28px 18px;
    background:radial-gradient(ellipse at 50% 100%,#141e50 0%,var(--bg) 60%);
  }

  /* ─── HEADER ─────────────────────────────────────────────────── */
  #gameHeader{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;margin-bottom:14px}
  #timerBlock{text-align:center;justify-self:center}
  #pairsBlock{text-align:right;justify-self:end}
  .brand{display:flex;align-items:center;gap:10px}
  .brand svg{display:block}
  .brand-name{font-size:.85rem;font-weight:800;letter-spacing:.15em;color:var(--teal);text-transform:uppercase}

  #timerBlock{text-align:center}
  #timerDisplay{
    font-size:2.4rem;font-weight:900;font-variant-numeric:tabular-nums;
    color:var(--text);letter-spacing:.04em;line-height:1;
    transition:color .4s;
  }
  #timerDisplay.urgent{color:#e53e3e;animation:timerUrgent .5s ease-in-out infinite alternate}
  #timerDisplay.done{color:#e53e3e}
  @keyframes timerUrgent{from{opacity:1}to{opacity:.55}}
  #timerLabel{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-top:2px}

  #pairsBlock{text-align:right}
  #pairsLabel{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
  #pairsCount{font-size:1rem;font-weight:700;color:var(--teal);margin-top:2px;font-variant-numeric:tabular-nums}

  /* ─── CARD GRID ───────────────────────────────────────────────── */
  #grid{
    flex:1;display:grid;grid-template-columns:repeat(4,1fr);
    grid-template-rows:repeat(4,1fr);gap:12px;
  }

  .card{perspective:1200px;border-radius:var(--radius);position:relative}
  .card-inner{
    position:relative;width:100%;height:100%;
    transform-style:preserve-3d;
    transition:transform .5s cubic-bezier(.4,0,.2,1);
  }
  .card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg)}
  .card-face{
    position:absolute;inset:0;border-radius:var(--radius);
    backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden;
  }
  .card-back-face{
    background:linear-gradient(145deg,#1e2d6e 0%,#283b86 55%,#2d42a0 100%);
    border:1px solid rgba(255,255,255,.12);
    display:flex;align-items:center;justify-content:center;
  }
  .card-back-face svg{width:41%;height:auto;opacity:.92}
  .card-front-face{
    background:var(--card-front);transform:rotateY(180deg);
    display:flex;align-items:center;justify-content:center;padding:12%;
  }
  .card-front-face .logo-wrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
  .card-front-face svg{width:100%;height:100%;object-fit:contain}
  .card.matched .card-front-face{
    background:#f0f4ff;
    box-shadow:0 0 0 2.5px #283b86,0 0 20px rgba(40,59,134,.4);
  }
  .card.matched .card-inner{animation:matchPulse .6s ease forwards}
  @keyframes matchPulse{
    0%{transform:rotateY(180deg) scale(1)}
    40%{transform:rotateY(180deg) scale(1.06)}
    100%{transform:rotateY(180deg) scale(1)}
  }

  /* ─── IDLE STATE ──────────────────────────────────────────────── */
  #idleScreen{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  }
  #idleScreen h2{font-size:2rem;font-weight:800;color:var(--teal);text-align:center}
  #idleScreen p{color:var(--muted);text-align:center;font-size:1rem;max-width:320px;line-height:1.6}
  #idleCards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;perspective:600px}
  .ic-wrap{width:42px;height:60px;flex-shrink:0}
  .ic-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d}
  .ic-face{
    position:absolute;inset:0;border-radius:7px;
    backface-visibility:hidden;-webkit-backface-visibility:hidden;
  }
  .ic-back{background:#1e2d7a;border:1.5px solid rgba(255,255,255,.18);box-shadow:0 4px 14px rgba(0,0,0,.5)}
  .ic-front{background:#8898c8;border:1.5px solid rgba(255,255,255,.35);transform:rotateY(180deg);box-shadow:0 4px 14px rgba(0,0,0,.4)}

  /* ─── BOTTOM PANEL ───────────────────────────────────────────── */
  .side-title{
    font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.18em;
    color:var(--muted);margin-bottom:10px;
    display:flex;align-items:center;gap:8px;
  }
  .side-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}

  #leaderboard{flex:1;overflow:hidden;display:flex;flex-direction:row;gap:8px;align-items:stretch}

  .lb-row{
    flex:1;min-width:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:5px;padding:10px 8px;border-radius:10px;
    transition:background .3s;text-align:center;position:relative;overflow:hidden;
  }
  .lb-row.rank-1{background:linear-gradient(160deg,rgba(240,180,41,.18),rgba(240,180,41,.06));border:1px solid rgba(240,180,41,.25)}
  .lb-row.rank-2{background:linear-gradient(160deg,rgba(192,192,192,.12),rgba(192,192,192,.04));border:1px solid rgba(192,192,192,.12)}
  .lb-row.rank-3{background:linear-gradient(160deg,rgba(184,115,51,.12),rgba(184,115,51,.04));border:1px solid rgba(184,115,51,.12)}
  .lb-row.rank-4,.lb-row.rank-5{background:linear-gradient(160deg,rgba(80,120,200,.10),rgba(80,120,200,.03));border:1px solid rgba(80,120,200,.10)}

  .lb-rank{
    width:52px;height:52px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-size:1.6rem;font-weight:800;
    background:rgba(40,59,134,.3);color:var(--muted);
  }
  .rank-1 .lb-rank{background:var(--gold);color:#3a2000;font-size:1.8rem}
  .rank-2 .lb-rank{background:#b0b8c8;color:#1a2030}
  .rank-3 .lb-rank{background:#c07350;color:#2a1a10}

  .lb-name{
    width:100%;font-weight:700;font-size:1.2rem;color:var(--text);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .lb-time{
    font-variant-numeric:tabular-nums;font-size:1.5rem;font-weight:800;color:var(--teal);
  }
  .rank-1 .lb-time{color:var(--gold)}

  .lb-empty{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:6px;color:var(--muted);font-size:.85rem;text-align:center;
  }
  .lb-empty .empty-icon{font-size:1.8rem;margin-bottom:2px}

  /* ─── CELEBRATION ────────────────────────────────────────────── */
  #celebration{position:fixed;inset:0;z-index:500;pointer-events:none;display:none}
  .confetti-particle{
    position:absolute;border-radius:2px;
    animation:fall linear forwards;
  }
  @keyframes fall{
    0%{transform:translateY(-20px) rotate(0deg);opacity:1}
    100%{transform:translateY(100vh) rotate(720deg);opacity:0}
  }

  /* ─── STATUS BANNER ──────────────────────────────────────────── */
  #statusBanner{
    display:none;
    border-radius:12px;padding:10px 20px;margin-bottom:10px;
    flex-direction:row;align-items:center;justify-content:center;gap:16px;
    flex-shrink:0;
  }
  #statusBanner.won{
    background:linear-gradient(135deg,#1a2460,#283b86);
    border:1px solid rgba(255,255,255,.2);
  }
  #statusBanner.qualified{
    background:linear-gradient(135deg,#3a2800,#6b4a00);
    border:1px solid rgba(240,180,41,.4);
  }
  #statusBanner.timeout{
    background:linear-gradient(135deg,#2a0808,#5a1010);
    border:1px solid rgba(229,62,62,.3);
  }
  .sb-icon{font-size:1.6rem}
  .sb-text{display:flex;flex-direction:column;gap:2px}
  .sb-label{font-size:.8rem;color:rgba(255,255,255,.6)}
  .sb-value{font-size:1.5rem;font-weight:900;color:#ffffff;font-variant-numeric:tabular-nums}
  #statusBanner.qualified .sb-value{color:var(--gold)}
  .sb-sub{font-size:.75rem;color:rgba(255,255,255,.5);font-style:italic}

  /* ─── CONNECTION ─────────────────────────────────────────────── */
  #connDot{
    position:fixed;top:12px;right:12px;
    width:8px;height:8px;border-radius:50%;
    background:#e53e3e;transition:background .3s;
  }
  #connDot.ok{background:#38a169}
</style>
</head>
<body>
<div id="celebration"></div>

<div id="app">
  <div id="gamePane">
    <div id="gameHeader">
      <div class="brand">
        <svg viewBox="0 177 1000 432" xmlns="http://www.w3.org/2000/svg" style="width:88px;height:auto">
          <g fill="white">
            <path d="M10.23,177.57h67.79c5.64,0,10.23,4.58,10.23,10.23v410.11c0,5.64-4.58,10.23-10.23,10.23H10.23c-5.64,0-10.23-4.58-10.23-10.23V187.8c0-5.65,4.58-10.23,10.23-10.23Z"/>

          </g>
        </svg>
      </div>
      <div id="timerBlock">
        <div id="timerDisplay">—</div>
        <div id="timerLabel">Remaining</div>
      </div>
      <div id="pairsBlock">
        <div id="pairsLabel">Pairs Found</div>
        <div id="pairsCount">—</div>
      </div>
    </div>

    <div id="grid" style="display:none"></div>
    <div id="idleScreen">
      <div id="idleCards">
        <div class="ic-wrap"><div class="ic-inner"><div class="ic-face ic-back"></div><div class="ic-face ic-front"></div></div></div>
        <div class="ic-wrap"><div class="ic-inner"><div class="ic-face ic-back"></div><div class="ic-face ic-front"></div></div></div>
        <div class="ic-wrap"><div class="ic-inner"><div class="ic-face ic-back"></div><div class="ic-face ic-front"></div></div></div>
        <div class="ic-wrap"><div class="ic-inner"><div class="ic-face ic-back"></div><div class="ic-face ic-front"></div></div></div>
      </div>
      <h2>Memory Match</h2>
      <p>Press start on the tablet to begin!</p>

  </div>

  <div id="sidePane">
    <div class="side-title">Top 5 Leaderboard</div>

    <div id="statusBanner">
      <div class="sb-icon" id="sbIcon"></div>
      <div class="sb-text">
        <div class="sb-label" id="sbLabel"></div>

      </div>

    <div id="leaderboard">
      <div class="lb-empty">
        <div class="empty-icon">🏅</div>
        No scores yet.<br/>Be the first to play!
      </div>
    </div>
  </div>
</div>


<div id="svgStore" style="position:fixed;left:-99999px;top:-99999px;width:2000px;height:2000px;overflow:hidden;visibility:hidden"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/motion.js"></script>
<script>
const { animate, stagger } = Motion;

// ── Idle card flip animation ──────────────────────────────────────────────────
let idleAnims = [];

function startIdleAnimation() {
  stopIdleAnimation();
  document.querySelectorAll('.ic-inner').forEach((el, i) => {
    idleAnims.push(animate(el, { rotateY: [0, 180, 0] }, {
      duration: 3.2,
      delay: i * 0.25,
      repeat: Infinity,
      ease: [0.4, 0, 0.2, 1],
    }));
  });
}

function stopIdleAnimation() {
  idleAnims.forEach(a => { try { a.cancel(); } catch (_) {} });
  idleAnims = [];
  document.querySelectorAll('.ic-inner').forEach(el => {
    el.style.transform = '';
  });
}

const GAME_TIME_LIMIT = 60000;

// ── Logo loading ─────────────────────────────────────────────────────────────

let logoBBoxes = [];
let svgDefs = '';
let svgGroups = [];

async function initLogos() {
  const res = await fetch('/logos.svg');
  const text = await res.text();
  const parser = new DOMParser();
  const doc = parser.parseFromString(text, 'image/svg+xml');
  const root = doc.documentElement;

  const clone = root.cloneNode(true);
  clone.removeAttribute('viewBox');
  clone.setAttribute('width', '2000');
  clone.setAttribute('height', '2000');
  document.getElementById('svgStore').appendChild(clone);

  const defsEl = clone.querySelector('defs');
  svgDefs = defsEl ? defsEl.outerHTML : '';
  const groups = Array.from(clone.querySelectorAll('svg > g'));
  svgGroups = groups.map(g => g.outerHTML);
  logoBBoxes = groups.map(g => {
    const bb = g.getBBox();
    return { x: bb.x, y: bb.y, w: bb.width, h: bb.height };
  });
  document.getElementById('svgStore').innerHTML = '';

  // If state arrived before logos finished loading, rebuild the card grid now
  renderedCardCount = 0;
  if (lastState) renderState(lastState);
}

function logoSVG(index) {
  const bb = logoBBoxes[index];
  if (!bb || bb.w === 0) return '';
  const pad = 4;
  const vb = `${bb.x - pad} ${bb.y - pad} ${bb.w + pad * 2} ${bb.h + pad * 2}`;
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${vb}" style="width:100%;height:100%">
    ${svgDefs}${svgGroups[index]}
  </svg>`;
}

const CARD_BACK_SVG = `<svg viewBox="0 177 1000 432" xmlns="http://www.w3.org/2000/svg">
  <g fill="white">
    <path d="M10.23,177.57h67.79c5.64,0,10.23,4.58,10.23,10.23v410.11c0,5.64-4.58,10.23-10.23,10.23H10.23c-5.64,0-10.23-4.58-10.23-10.23V187.8c0-5.65,4.58-10.23,10.23-10.23Z"/>
    <path d="M172.28,451.36c11.5-41.08,41.1-86.95,75.95-112.05,5.06-3.64,8.19-9.39,8.19-15.63v-135.88c0-5.65-4.58-10.23-10.23-10.23h-67.78c-5.65,0-10.23,4.58-10.23,10.23v263c0,2.45,3.44,2.92,4.1.56Z"/>
    <path d="M539.47,177.57h-67.79c-5.65,0-10.23,4.58-10.23,10.23v151.55c0,5.75-4.66,10.42-10.42,10.42h-84.85c-109.25,0-198,88.56-198,197.81v50.34c0,5.65,4.58,10.22,10.22,10.22h67.8c5.65,0,10.22-4.58,10.22-10.22v-50.33c0-60.62,49.14-109.76,109.76-109.76h84.99c5.69.08,10.28,4.7,10.28,10.4v149.69c0,5.65,4.58,10.23,10.23,10.23h67.79c5.65,0,10.23-4.58,10.23-10.23V187.79c0-5.65-4.58-10.23-10.23-10.23Z"/>
    <path d="M989.77,177.57h-67.8c-5.65,0-10.22,4.58-10.22,10.22v50.33c0,60.62-49.14,109.76-109.76,109.76h-84.99c-5.69-.08-10.28-4.7-10.28-10.4v-149.69c0-5.65-4.58-10.23-10.23-10.23h-67.79c-5.65,0-10.23,4.58-10.23,10.23v410.11c0,5.65,4.58,10.23,10.23,10.23h67.79c5.65,0,10.23-4.58,10.23-10.23v-151.55c0-5.75,4.66-10.42,10.42-10.42h84.85c109.25,0,198-88.56,198-197.81v-50.34c0-5.65-4.58-10.22-10.22-10.22Z"/>
    <path d="M995.89,334.34c-11.5,41.08-41.1,86.95-75.95,112.05-5.06,3.65-8.19,9.39-8.19,15.63v135.88c0,5.65,4.58,10.23,10.23,10.23h67.78c5.65,0,10.23-4.58,10.23-10.23v-263c0-2.45-3.44-2.92-4.1-.56Z"/>
  </g>
</svg>`;

// ── Socket & rendering ───────────────────────────────────────────────────────

const socket = io();
let renderedCardCount = 0;
let currentGameId = null;
let timerInterval = null;
let lastState = null;

const grid           = document.getElementById('grid');
const idleScreen     = document.getElementById('idleScreen');
const timerDisplay   = document.getElementById('timerDisplay');
const pairsCount     = document.getElementById('pairsCount');
const leaderboard    = document.getElementById('leaderboard');
const statusBanner   = document.getElementById('statusBanner');
const sbIcon         = document.getElementById('sbIcon');
const sbLabel        = document.getElementById('sbLabel');
const sbValue        = document.getElementById('sbValue');
const sbSub          = document.getElementById('sbSub');
const connDot        = document.getElementById('connDot');

socket.on('connect', () => connDot.classList.add('ok'));
socket.on('disconnect', () => connDot.classList.remove('ok'));

socket.on('state:sync', (state) => {
  const isNowFinished = (state.status === 'finished' || state.status === 'timeout') &&
                        lastState?.status === 'playing';
  lastState = state;

  renderLeaderboard(state.leaderboard);

  if (state.status === 'idle')     { showIdle(); return; }
  if (state.status === 'playing')  { showGame(state); return; }
  if (state.status === 'finished') { showFinished(state, isNowFinished); return; }
  if (state.status === 'timeout')  { showTimeout(isNowFinished); }
});

function fmtMs(ms) {
  const s = Math.floor(ms / 1000);
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}

function stopTimer() {
  clearInterval(timerInterval);
  timerDisplay.classList.remove('urgent', 'done');
}

function showIdle() {
  stopTimer();
  timerDisplay.textContent = '—';
  timerDisplay.classList.remove('urgent', 'done');
  pairsCount.textContent = '—';
  grid.style.display = 'none';
  idleScreen.style.display = 'flex';
  statusBanner.style.display = 'none';
  renderedCardCount = 0;
  startIdleAnimation();
}

function showGame(state) {
  stopIdleAnimation();
  idleScreen.style.display = 'none';
  grid.style.display = 'grid';
  statusBanner.style.display = 'none';

  const matched = state.cards.filter(c => c.matched).length / 2;
  pairsCount.textContent = `${matched}/8`;

  stopTimer();
  const st = state.startTime || Date.now();
  timerInterval = setInterval(() => {
    const elapsed = Date.now() - st;
    const remaining = Math.max(0, GAME_TIME_LIMIT - elapsed);
    timerDisplay.textContent = fmtMs(remaining);
    timerDisplay.classList.toggle('urgent', remaining < 15000 && remaining > 0);
  }, 100);

  renderCards(state.cards, state.startTime);
}

function showFinished(state, animate_in) {
  stopTimer();
  idleScreen.style.display = 'none';
  grid.style.display = 'grid';

  const timeStr = fmtMs(state.pendingScore);
  timerDisplay.textContent = timeStr;
  pairsCount.textContent = '8/8';

  statusBanner.className = state.qualifies ? 'qualified' : 'won';
  statusBanner.style.display = 'flex';

  if (state.qualifies) {
    sbIcon.textContent = '🏆';
    sbLabel.textContent = 'New Top 5!';
    sbValue.textContent = timeStr;
    sbSub.textContent = 'Entering name on the tablet…';
  } else {
    sbIcon.textContent = '🎴';
    sbLabel.textContent = 'Finished in';
    sbValue.textContent = timeStr;
    sbSub.textContent = 'Great effort!';
  }

  renderCards(state.cards, state.startTime);

  if (animate_in) {
    if (state.qualifies) launchConfetti();
    animate('#statusBanner', { opacity: [0,1], y: [-16,0], scale: [.96,1] }, { duration: .5 });
  }
}

function showTimeout(animate_in) {
  stopTimer();
  timerDisplay.textContent = '0:00';
  timerDisplay.classList.add('done');
  idleScreen.style.display = 'none';
  grid.style.display = 'grid';

  statusBanner.className = 'timeout';
  statusBanner.style.display = 'flex';
  sbIcon.textContent = '⏰';
  sbLabel.textContent = 'Time\'s Up!';
  sbValue.textContent = '1:00';
  sbSub.textContent = 'Better luck next time!';

  if (animate_in) {
    animate('#statusBanner', { opacity: [0,1], y: [-16,0] }, { duration: .4 });
  }
}

// ── Cards ────────────────────────────────────────────────────────────────────

function renderCards(cards, gameId) {
  if (gameId !== currentGameId || cards.length !== renderedCardCount) {
    grid.innerHTML = '';
    renderedCardCount = cards.length;
    currentGameId = gameId;

    cards.forEach((card) => {
      const el = document.createElement('div');
      el.className = 'card';
      el.dataset.id = card.id;
      el.innerHTML = `
        <div class="card-inner">
          <div class="card-face card-back-face">${CARD_BACK_SVG}</div>
          <div class="card-face card-front-face">
            <div class="logo-wrap">${logoSVG(card.logoIndex)}</div>
          </div>
        </div>`;
      grid.appendChild(el);
    });

    animate('.card', { opacity: [0,1], scale: [.8,1] }, {
      duration: .4,
      delay: stagger(.03),
      easing: [.22,1,.36,1]
    });
  }

  cards.forEach((card) => {
    const el = grid.querySelector(`[data-id="${card.id}"]`);
    if (!el) return;
    el.classList.toggle('flipped', card.flipped || card.matched);
    el.classList.toggle('matched', card.matched);
  });
}

// ── Leaderboard ──────────────────────────────────────────────────────────────

const MEDALS = ['🥇','🥈','🥉'];
const RANK_CLASSES = ['rank-1','rank-2','rank-3','rank-4','rank-5'];

function renderLeaderboard(entries) {
  if (!entries || entries.length === 0) {
    leaderboard.innerHTML = `<div class="lb-empty"><div class="empty-icon">🏅</div>No scores yet.<br/>Be the first to play!</div>`;
    return;
  }

  leaderboard.innerHTML = entries.map((e, i) => `
    <div class="lb-row ${RANK_CLASSES[i] || ''}">
      <div class="lb-rank">${MEDALS[i] || i + 1}</div>
      <div class="lb-name">${escHtml(e.name)}</div>
      <div class="lb-time">${e.timeStr}</div>
    </div>`).join('');
}

function escHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── Confetti ─────────────────────────────────────────────────────────────────

function launchConfetti() {
  const cel = document.getElementById('celebration');
  cel.style.display = 'block';
  cel.innerHTML = '';
  const colors = ['#00c9c8','#f0b429','#e8f4ff','#28aa56','#e9373b','#0367af'];
  for (let i = 0; i < 80; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-particle';
    const size = 6 + Math.random() * 8;
    p.style.cssText = `
      width:${size}px;height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      left:${Math.random()*100}%;top:0;
      animation-duration:${2+Math.random()*2}s;
      animation-delay:${Math.random()*.8}s;
    `;
    cel.appendChild(p);
  }
  setTimeout(() => { cel.style.display = 'none'; cel.innerHTML = ''; }, 4000);
}

// ── Init ─────────────────────────────────────────────────────────────────────

initLogos().catch(console.error);
</script>
